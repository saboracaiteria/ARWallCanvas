name: Build ARWallCanvas

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install SDK 34
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 || \
          yes | $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 || \
          echo "SDK 34 já instalado ou sdkmanager em local diferente"

      - name: 🏗️ Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔑 Permissão gradlew
        run: chmod +x gradlew

      - name: 🛠️ Build Debug APK
        run: ./gradlew assembleDebug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ARWallCanvas-debug
          path: app/build/outputs/apk/debug/app-debug.apk
